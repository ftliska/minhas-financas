<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Financeiro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>Resumo Financeiro</h1>

  <div class="input-group">
    <label>Salário Líquido</label>
    <input type="text" id="salario" placeholder="R$ 0,00" oninput="formatarMoeda(this)">
  </div>

  <div class="input-group">
    <label>Gastos Fixos</label>
    <input type="text" id="fixos" placeholder="R$ 0,00" oninput="formatarMoeda(this)">
  </div>

  <div class="input-group">
    <label>Gastos Variáveis</label>
    <input type="text" id="variaveis" placeholder="R$ 0,00" oninput="formatarMoeda(this)">
  </div>

  <button onclick="gerarGrafico()">Gerar Análise</button>

  <div class="chart-container">
    <canvas id="grafico"></canvas>
    <div class="center-text" id="centerText"></div>
  </div>

  <div id="sugestao"></div>

</div>

<script src="script.js"></script>

</body>
</html>
