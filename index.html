<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Financeiro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0f1115;
      color: #e5e7eb;
      font-family: 'Inter', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1a1d24;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 420px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 20px;
      font-weight: 600;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #9ca3af;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #2a2f3a;
      color: #fff;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      background: #323847;
      box-shadow: 0 0 0 1px #6366f1;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #6366f1;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 600;
    }

    button:hover {
      background: #4f46e5;
      transform: translateY(-1px);
    }

    .chart-container {
      position: relative;
      margin-top: 35px; /* mais espaço acima do gráfico */
    }

    canvas {
      margin-top: 10px;
    }

    .center-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .center-text span {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .center-text strong {
      font-size: 26px;
      font-weight: 700;
      transition: color 0.3s ease;
    }

    .suggestion {
      margin-top: 25px; /* mais espaço abaixo do gráfico */
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      background: #1e293b;
      color: #93c5fd;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>Resumo Financeiro</h1>

  <div class="input-group">
    <label>Salário Líquido</label>
    <input type="text" id="salario" placeholder="R$ 0,00" oninput="formatarMoeda(this)">
  </div>

  <div class="input-group">
    <label>Gastos Fixos</label>
    <input type="text" id="fixos" placeholder="R$ 0,00" oninput="formatarMoeda(this)">
  </div>

  <div class="input-group">
    <label>Gastos Variáveis</label>
    <input type="text" id="variaveis" placeholder="R$ 0,00" oninput="formatarMoeda(this)">
  </div>

  <button onclick="gerarGrafico()">Gerar Análise</button>

  <div class="chart-container">
    <canvas id="grafico"></canvas>
    <div class="center-text" id="centerText"></div>
  </div>

  <div id="sugestao"></div>

</div>

<script>
  let chart;

  function formatarMoeda(input) {
    let valor = input.value.replace(/\D/g, '');
    valor = (valor / 100).toFixed(2) + '';
    valor = valor.replace('.', ',');
    valor = valor.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
    input.value = 'R$ ' + valor;
  }

  function parseValor(valor) {
    return parseFloat(valor.replace(/\D/g, '')) / 100 || 0;
  }

  function gerarGrafico() {
    const salario = parseValor(document.getElementById('salario').value);
    const fixos = parseValor(document.getElementById('fixos').value);
    const variaveis = parseValor(document.getElementById('variaveis').value);

    const totalGastos = fixos + variaveis;
    const sobra = Math.max(salario - totalGastos, 0);

    const sugestaoIdeal = salario * 0.2;
    const sugestaoInvest = Math.min(sugestaoIdeal, sobra);

    const comprometido = salario ? ((totalGastos / salario) * 100).toFixed(0) : 0;

    let cor = '#34d399';
    if (comprometido > 90) cor = '#f87171';
    else if (comprometido > 80) cor = '#fbbf24';

    document.getElementById('centerText').innerHTML = `<span>Comprometido:</span><strong style="color: ${cor}"> ${comprometido}%</strong>`;

    document.getElementById('sugestao').innerHTML = `
      <div class="suggestion">
        💡 Sugestão de investimento: <strong>R$ ${sugestaoInvest.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong><br>
        <span style="font-size:12px;color:#9ca3af">(Base: 20% da renda ou sua sobra disponível)</span>
      </div>
    `;

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById('grafico'), {
      type: 'doughnut',
      data: {
        labels: ['Fixos', 'Variáveis', 'Sobra'],
        datasets: [{
          data: [0, 0, 0],
          backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6'],
          borderWidth: 0,
          hoverOffset: 14,
          spacing: 2
        }]
      },
      options: {
        onHover: (event, elements) => {
          event.native.target.style.cursor = elements.length ? 'pointer' : 'default';
        },
        animation: {
          duration: 1000,
          easing: 'easeOutCubic'
        },
        plugins: {
          legend: {
            labels: { color: '#e5e7eb' }
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                let value = context.raw || 0;
                return `${context.label}: R$ ${value.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
              }
            }
          }
        },
        cutout: '70%'
      }
    });

    setTimeout(() => {
      chart.data.datasets[0].data = [fixos, variaveis, sobra];
      chart.update();
    }, 50);
  }
</script>

</body>
</html>
